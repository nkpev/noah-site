<!DOCTYPE html>
<html>
<head>
    <title>Cities - Noah Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #dbeafe;
            color: #111;
            margin: 0;
        }

        nav {
            background: white;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        nav a {
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
            color: #2563eb;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .city-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .city-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="cities.html">Cities</a>
        <a href="rants.html">Rants</a>
    </nav>

    <div class="container">
        <h1>Cities I've Been To 🌆</h1>

        <div class="grid">
            <div class="city-card">Los Angeles</div>
            <div class="city-card">San Diego</div>
            <div class="city-card">San Jose</div>
            <div class="city-card">San Francisco</div>
            <div class="city-card">Fresno</div>
            <div class="city-card">Sacramento</div>
            <div class="city-card">Long Beach</div>
            <div class="city-card">Oakland</div>
            <div class="city-card">Bakersfield</div>
            <div class="city-card">Anaheim</div>
            <div class="city-card">Santa Ana</div>
            <div class="city-card">Riverside</div>
            <div class="city-card">Stockton</div>
            <div class="city-card">Irvine</div>
        </div>
    </div>

</body>
</html>
